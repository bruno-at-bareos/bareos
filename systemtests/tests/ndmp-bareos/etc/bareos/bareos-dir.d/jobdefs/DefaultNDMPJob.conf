JobDefs {
  Name = "DefaultNDMPJob"
  Type = Backup
  Protocol = NDMP
  Level = Incremental
  Client = isilon
  Backup Format = dump
#  Backup Format = tar
  FileSet = "isilon-fileset"
  Storage = isilonfile
  Messages = Standard
  Pool = isilon
  Priority = 10
  Save File History = Yes
  Reschedule On Error     = yes
  Reschedule Interval     = 1 minutes
  Reschedule Times        = 1
  Allow Duplicate jobs    = no
}
